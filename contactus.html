        <div class="d-flex align-items-center gap-3">

          <input type="search" class="form-control search-bar" placeholder="Search...">

          <button class="cart-icon">
            <i class="bi bi-cart3"></i>
            <span id="contador">0</span>
          </button>

        </div>
      </div>

      <!-- LOGO -->
      <div class="logo-centro text-center">
        <img src="img/logotech.png" class="logo-central-img" alt="Logo tech store">
      </div>

      <!-- MENU -->
      <ul class="nav justify-content-center mt-4">

        <li class="nav-item">
          <a class="nav-link" href="index.html">
            <i class="bi bi-house-door-fill"></i> Home

        <li class="nav-item">

  <div class="container form-container">
        <h1>Dados do cliente</h1>
        <form class="frmi" id="formContato">

            <input type="text" id="nome" placeholder="Seu nome completo" required>

            <input type="email" id="email" placeholder="Seu e-mail" required>

            <input type="text" id="assunto" placeholder="Assunto" required>

            <textarea id="mensagem" placeholder="Digite sua mensagem..." rows="4" required></textarea>

            <button type="submit" class="btn-primary">Enviar</button>

        </form>
