<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TECH STORE LOGIN</title>
</head>
<body class="bg-login">
    <div class="container form-container"">
        <h1>Dados do cliente</h1>
        <form class="frmi" id="formCadastro">
            <input type="text" id="nome" placeholder="Nome completo" required>
            <input type="text" id="cep" placeholder="CEP (somente numeros)" maxlength="8" required>
            <input type="text" id="logradouro" placeholder="Logadouro" required>
            <input type="text" id="bairro" placeholder="bairro" required>
            <input type="text" id="cidade" placeholder="Cidade" required>
            <input type="text" id="estado" placeholder="Estado" required>
            <input type="text" id="user" placeholder="user" required>
            <input type="text" id="senha" placeholder="senha" required>

            <button type="submit" class="btn-primary">Cadastrar</button>
        </form>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
